apiVersion: apps/v1
kind: Deployment
namespace: dev
metadata:
  labels:
    app: springboot-app
  name: springboot-app-deployment
spec:
  replicas: 4
  selector:
    matchLabels:
      app: springboot-app
  template:
    metadata:
      labels:
        app: springboot-app
    spec:
      containers:
      - name: my-springboot-app
        image: 312272890910.dkr.ecr.ap-south-2.amazonaws.com/my-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8085
          name: http
          protocol: TCP
# service type loadbalancer       
---
apiVersion: v1
kind: Service
namespace: dev
metadata:
  labels:
    app: springboot-app
    k8s-app: springboot-app
  name: springboot-service
spec:
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 8085
  type: LoadBalancer
  selector:
    app: springboot-app
